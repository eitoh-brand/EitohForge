name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest (with coverage gate)
        run: >
          pytest
          --strict-markers
          --cov=eitohforge_sdk
          --cov=eitohforge_cli
          --cov-fail-under=82
          --cov-report=term-missing

      - name: Migration policy check
        run: python scripts/check_migration_policy.py

      - name: Packaging metadata check
        run: python scripts/validate_packaging_metadata.py

  example-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install EitohForge + example packages
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "examples/example-minimal[dev]"
          pip install -e "examples/example-enterprise[dev]"

      - name: Pytest example-minimal
        run: pytest examples/example-minimal/tests -q

      - name: Pytest example-enterprise
        run: pytest examples/example-enterprise/tests -q

  package-build:
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "1735689600"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build pass A
        run: python -m build --sdist --wheel --outdir dist-pass-a

      - name: Build pass B
        run: python -m build --sdist --wheel --outdir dist-pass-b

      - name: Verify reproducibility
        run: python scripts/verify_reproducible_build.py dist-pass-a dist-pass-b

      - name: Validate distribution metadata
        run: twine check dist-pass-a/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts
          path: dist-pass-a/*

  security-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security/compliance tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,release]"

      - name: Dependency vulnerability audit
        run: pip-audit --strict

      - name: Generate SBOM
        run: |
          mkdir -p compliance
          cyclonedx-py environment --output-file compliance/sbom.cdx.json --of JSON

      - name: Generate dependency licenses report
        run: pip-licenses --format=json --output-file=./compliance/licenses.json

      - name: Enforce dependency license policy
        run: python scripts/check_license_policy.py

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifacts
          path: compliance/*
